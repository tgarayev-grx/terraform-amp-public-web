version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - |
              cd ../..
              corepack enable
              corepack prepare pnpm@9.0.0 --activate
              pnpm config set store-dir .pnpm-store
              pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @grx/web build
        postBuild:
          commands:
            # Next standalone nests as .next/standalone/apps/web; Amplify looks for next under .next/standalone/node_modules.
            - |
              NEST=".next/standalone/apps/web"
              if [ -d "$NEST" ]; then
                cp -r "$NEST"/. .next/standalone/
                rm -rf .next/standalone/apps
              fi
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          # Amplify cache upload limit is 5GB; omit .pnpm-store and node_modules.
          - apps/web/.next/cache/**/*
  - appRoot: apps/docs
    frontend:
      phases:
        preBuild:
          commands:
            - |
              cd ../..
              corepack enable
              corepack prepare pnpm@9.0.0 --activate
              pnpm config set store-dir .pnpm-store
              pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @grx/docs build
        postBuild:
          commands:
            - |
              NEST=".next/standalone/apps/docs"
              if [ -d "$NEST" ]; then
                cp -r "$NEST"/. .next/standalone/
                rm -rf .next/standalone/apps
              fi
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - apps/docs/.next/cache/**/*
