version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - |
              cd ../..
              corepack enable
              corepack prepare pnpm@9.0.0 --activate
              pnpm config set store-dir .pnpm-store
              pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @grx/web build
        postBuild:
          commands:
            # Flatten monorepo standalone layout; copy static + public (Next standalone runtime).
            # Do not upload full .next — .next/cache alone exceeds Amplify's ~220MB output limit.
            - |
              set -e
              NEST=".next/standalone/apps/web"
              if [ -d "$NEST" ]; then
                cp -r "$NEST"/. .next/standalone/
                rm -rf .next/standalone/apps
              fi
              mkdir -p .next/standalone/.next
              cp -r .next/static .next/standalone/.next/static
              if [ -d public ]; then
                rm -rf .next/standalone/public
                cp -r public .next/standalone/public
              fi
      artifacts:
        baseDirectory: .next/standalone
        files:
          - "**/*"
      cache:
        paths:
          # Amplify cache upload limit is 5GB; omit .pnpm-store and node_modules.
          - apps/web/.next/cache/**/*
  - appRoot: apps/docs
    frontend:
      phases:
        preBuild:
          commands:
            - |
              cd ../..
              corepack enable
              corepack prepare pnpm@9.0.0 --activate
              pnpm config set store-dir .pnpm-store
              pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @grx/docs build
        postBuild:
          commands:
            - |
              set -e
              NEST=".next/standalone/apps/docs"
              if [ -d "$NEST" ]; then
                cp -r "$NEST"/. .next/standalone/
                rm -rf .next/standalone/apps
              fi
              mkdir -p .next/standalone/.next
              cp -r .next/static .next/standalone/.next/static
              if [ -d public ]; then
                rm -rf .next/standalone/public
                cp -r public .next/standalone/public
              fi
      artifacts:
        baseDirectory: .next/standalone
        files:
          - "**/*"
      cache:
        paths:
          - apps/docs/.next/cache/**/*
