version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - |
              cd ../..
              corepack enable
              corepack prepare pnpm@9.0.0 --activate
              pnpm config set store-dir .pnpm-store
              pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @grx/web build
        postBuild:
          commands:
            # Amplify Next SSR expects a normal .next tree (required-server-files.json, server/, static/, etc.).
            # The ~220MB artifact cap is exceeded if .next/cache is included — it is not used at runtime.
            # It is still restored between builds via `cache.paths` below.
            - |
              set -e
              if [ ! -d .next ] && [ -d "${AMPLIFY_MONOREPO_APP_ROOT:-apps/web}/.next" ]; then
                cd "${AMPLIFY_MONOREPO_APP_ROOT:-apps/web}"
              fi
              rm -rf .next/cache
              rm -rf .next/trace
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - apps/web/.next/cache/**/*
  - appRoot: apps/docs
    frontend:
      phases:
        preBuild:
          commands:
            - |
              cd ../..
              corepack enable
              corepack prepare pnpm@9.0.0 --activate
              pnpm config set store-dir .pnpm-store
              pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @grx/docs build
        postBuild:
          commands:
            - |
              set -e
              if [ ! -d .next ] && [ -d "${AMPLIFY_MONOREPO_APP_ROOT:-apps/docs}/.next" ]; then
                cd "${AMPLIFY_MONOREPO_APP_ROOT:-apps/docs}"
              fi
              rm -rf .next/cache
              rm -rf .next/trace
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - apps/docs/.next/cache/**/*
