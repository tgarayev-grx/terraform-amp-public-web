version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@9.0.0 --activate
            - pnpm config set store-dir .pnpm-store
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @grx/web build
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"
      cache:
        paths:
          - .pnpm-store/**/*
          - apps/web/.next/cache/**/*
  - appRoot: apps/docs
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@9.0.0 --activate
            - pnpm config set store-dir .pnpm-store
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @grx/docs build
      artifacts:
        baseDirectory: apps/docs/.next
        files:
          - "**/*"
      cache:
        paths:
          - .pnpm-store/**/*
          - apps/docs/.next/cache/**/*